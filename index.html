<!doctype html>
<html class="bg-[#F8FAFC]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <script src="https://kit.fontawesome.com/2e4147469f.js" crossorigin="anonymous"></script>
  </head>
 
  <body>
        <main class="mt-8">
            <div class="container  m-auto px-10 md:px-20">
                <header class="mb-[100px]">
                <h1 class="text-3xl mb-3 text-center md:text-left">Job Application Tracker</h1>
                <div class="dashboard flex justify-between items-center gap-4 flex-col md:flex-row">
                    <div class="child p-4 bg-[#fff] w-full shadow">
                        <p class="text-sm font-semibold text-center md:text-left">Total</p>
                        <h2 id="TotalJob" class="text-2xl text-center md:text-left">0</h2>
                    </div>
                    <div class="child p-4 bg-[#fff] w-full shadow">
                        <p class="text-sm font-semibold text-center md:text-left">Interview</p>
                        <h2 id="interviewCount" class="text-green-500 text-2xl text-center md:text-left">0</h2>
                    </div>
                    <div class="child p-4 bg-[#fff] w-full shadow">
                        <p class="text-sm font-semibold text-center md:text-left">Rejected</p>
                        <h2 id="rejectedCount" class="text-red-500 text-2xl text-center md:text-left">0</h2>
                    </div>
                </div>
            </header>

            <!-- job section  -->
             <hr>
             <div class="flex justify-between items-center my-4">
                <h1 class="text-2xl">Available Jobs</h1>
                 <p class="text-lg font-semibold"><span id="AvailableJob"></span> jobs</p>
             </div>
             <div class="buttonSection mb-6">
              <button id="allBtn" class="btn btn-success  w-20" onclick="loadAllData()">All</button>
              <button id="interviewBtn" onclick="loadInterview()" class="btn">Interview</button>
              <button id="rejectBtn" onclick="loadRejectedJobs()" class="btn">Rejected</button>
             </div>
             <div id="cardContainer" class="cardContainer">
               
             </div>
             
            </div>
        </main>
        <script src="js/script.js"></script>
  </body>
</html>
